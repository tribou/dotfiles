---
- name: Clone TPM
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm
    dest: "{{ dotfiles_home }}/.tmux/plugins/tpm"
    depth: 1
    version: master
    update: "{{ dotfiles_state == 'latest' }}"

- name: Install tmux plugins via TPM (detached-session workaround)
  ansible.builtin.shell:
    cmd: >
      tmux new-session -d -s _bootstrap_tpm;
      tmux set-environment -t _bootstrap_tpm -g TMUX_PLUGIN_MANAGER_PATH "{{ dotfiles_home }}/.tmux/plugins/";
      "{{ dotfiles_home }}/.tmux/plugins/tpm/bin/install_plugins";
      tmux kill-session -t _bootstrap_tpm 2>/dev/null || true
    executable: /bin/bash
    creates: "{{ dotfiles_home }}/.tmux/plugins/tmux-sensible"
  when: "'TMUX' not in ansible_facts.env"

- name: Install tmux plugins via TPM (inside existing tmux server)
  ansible.builtin.shell:
    cmd: >
      tmux set-environment -g TMUX_PLUGIN_MANAGER_PATH "{{ dotfiles_home }}/.tmux/plugins/";
      "{{ dotfiles_home }}/.tmux/plugins/tpm/bin/install_plugins"
    executable: /bin/bash
    creates: "{{ dotfiles_home }}/.tmux/plugins/tmux-sensible"
  when: "'TMUX' in ansible_facts.env"
