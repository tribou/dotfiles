services:
  base:
    build: .
    volumes:
      - .:/dotfiles

  ci:
    extends:
      service: base
    command: >
      bash -c "
        scripts/bootstrap-test.sh &&
        goss validate --format tap &&
        ./tests/test_helper/bats-core/bin/bats tests/integration/
      "

  dev:
    extends:
      service: base
    stdin_open: true
    tty: true
    command: >
      bash -c "scripts/bootstrap-test.sh && bash"
